name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq ripgrep

      - name: ShellCheck
        run: shellcheck scripts/*.sh

      - name: Required files
        run: |
          set -e
          for f in \
            docker-compose.yml \
            docker-compose.dev.yml \
            Makefile \
            README.md \
            LICENSE \
            .env.example \
            scripts/deploy.sh \
            scripts/validate-env.sh \
            scripts/fetch-secrets-gsm.sh \
            scripts/bootstrap-config.sh \
            scripts/reown-openclaw-mounts.sh \
            scripts/docker-compose.sh \
            docker-compose.gog.yml \
            config/openclaw.example.json5 \
            config/openclaw-timeouts.example.json5 \
            config/safety.example.json5 \
            config/providers.example.json5; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done

      - name: Secret pattern scan
        run: ./scripts/ci-secret-scan.sh

      - name: Minimal .env for compose parsing
        run: |
          cp .env.example .env
          grep -v '^TELEGRAM_BOT_TOKEN=' .env > .env.tmp && mv .env.tmp .env || true
          echo "TELEGRAM_BOT_TOKEN=placeholder-for-ci" >> .env
          echo "USE_GSM_SECRETS=false" >> .env
          echo "VALIDATION_LEVEL=minimal" >> .env

      - name: Validate env script (minimal)
        run: ./scripts/validate-env.sh

      - name: Docker Compose config
        run: |
          ./scripts/docker-compose.sh config >/dev/null
          ./scripts/docker-compose.sh -f docker-compose.dev.yml config >/dev/null
