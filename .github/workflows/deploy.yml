name: deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-gcp-vm
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      instances: ${{ steps.matrix.outputs.instances }}
    steps:
      - uses: actions/checkout@v4
      - name: Load deploy instances
        id: matrix
        env:
          DEPLOY_INSTANCES_JSON_VAR: ${{ vars.DEPLOY_INSTANCES_JSON }}
          DEPLOY_INSTANCES_JSON_SECRET: ${{ secrets.DEPLOY_INSTANCES_JSON }}
        run: |
          set -euo pipefail
          MANIFEST=""
          DEPLOY_INSTANCES_JSON="${DEPLOY_INSTANCES_JSON_VAR:-}"
          MANIFEST_SOURCE=""
          if [[ -n "$DEPLOY_INSTANCES_JSON" ]]; then
            MANIFEST_SOURCE="repository variable DEPLOY_INSTANCES_JSON"
          elif [[ -n "${DEPLOY_INSTANCES_JSON_SECRET:-}" ]]; then
            DEPLOY_INSTANCES_JSON="$DEPLOY_INSTANCES_JSON_SECRET"
            MANIFEST_SOURCE="repository secret DEPLOY_INSTANCES_JSON"
          fi
          if [[ -n "$DEPLOY_INSTANCES_JSON" ]]; then
            printf '%s' "$DEPLOY_INSTANCES_JSON" > /tmp/deploy-instances.json
            MANIFEST=/tmp/deploy-instances.json
            echo "Using $MANIFEST_SOURCE"
            jq -r '.instances[] | "  - id=\(.id) path=\(.path)"' "$MANIFEST"
          elif [[ -f deploy/instances.json ]]; then
            MANIFEST=deploy/instances.json
            echo "Using deploy/instances.json"
          elif [[ -f deploy/instances.example.json ]]; then
            MANIFEST=deploy/instances.example.json
            echo "Using deploy/instances.example.json (default ~/openclaw)"
          else
            echo "No deploy manifest found" >&2
            exit 1
          fi
          jq -e '.instances | type == "array" and length > 0' "$MANIFEST" >/dev/null
          echo "instances=$(jq -c '.instances' "$MANIFEST")" >> "$GITHUB_OUTPUT"

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        instance: ${{ fromJson(needs.prepare.outputs.instances) }}
    env:
      GCP_VM_PORT_SECRET: ${{ secrets.GCP_VM_PORT }}
    steps:
      - name: Resolve SSH port
        id: ssh_port
        run: |
          p="${GCP_VM_PORT_SECRET:-}"
          if [[ -z "$p" ]]; then p=22; fi
          echo "port=$p" >> "$GITHUB_OUTPUT"

      - name: Deploy ${{ matrix.instance.id }} (${{ matrix.instance.path }})
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: ${{ steps.ssh_port.outputs.port }}
          script_stop: true
          script: |
            set -euo pipefail
            INSTANCE_ID="${{ matrix.instance.id }}"
            DEPLOY_PATH="$HOME/${{ matrix.instance.path }}"
            echo "Deploy instance=$INSTANCE_ID path=$DEPLOY_PATH"
            if [[ ! -d "$DEPLOY_PATH/.git" ]]; then
              echo "Clone this repo to $DEPLOY_PATH on the VM first (see docs/GITHUB_ACTIONS.md)."
              exit 1
            fi
            cd "$DEPLOY_PATH"
            git fetch origin
            if git rev-parse --verify origin/main >/dev/null 2>&1; then
              git checkout main
              git pull --ff-only origin main
            elif git rev-parse --verify origin/master >/dev/null 2>&1; then
              git checkout master
              git pull --ff-only origin master
            else
              echo "No origin/main or origin/master; set a default branch on GitHub." >&2
              exit 1
            fi
            touch .env
            grep -v '^USE_GSM_SECRETS=' .env > .env.tmp || true
            mv .env.tmp .env
            echo 'USE_GSM_SECRETS=true' >> .env
            ./scripts/remote-deploy.sh "$INSTANCE_ID"
            echo "Deploy OK: $INSTANCE_ID"
