name: deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-gcp-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_VM_PORT_SECRET: ${{ secrets.GCP_VM_PORT }}
    steps:
      - name: Resolve SSH port
        id: ssh_port
        run: |
          p="${GCP_VM_PORT_SECRET:-}"
          if [[ -z "$p" ]]; then p=22; fi
          echo "port=$p" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: ${{ steps.ssh_port.outputs.port }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${DEPLOY_PATH:-$HOME/openclaw}"
            if [[ ! -d "$DEPLOY_PATH/.git" ]]; then
              echo "Clone this repo to $DEPLOY_PATH on the VM first (see docs/GITHUB_ACTIONS.md)."
              exit 1
            fi
            cd "$DEPLOY_PATH"
            git fetch origin
            if git rev-parse --verify origin/main >/dev/null 2>&1; then
              git checkout main
              git pull --ff-only origin main
            elif git rev-parse --verify origin/master >/dev/null 2>&1; then
              git checkout master
              git pull --ff-only origin master
            else
              echo "No origin/main or origin/master; set a default branch on GitHub or clone with an explicit branch." >&2
              exit 1
            fi
            # Production defaults: runtime secrets come from GSM via VM IAM.
            touch .env
            grep -v '^USE_GSM_SECRETS=' .env > .env.tmp || true
            mv .env.tmp .env
            echo 'USE_GSM_SECRETS=true' >> .env
            export VALIDATION_LEVEL=full
            ./scripts/bootstrap-config.sh
            ./scripts/validate-env.sh
            ./scripts/fetch-secrets-gsm.sh
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d
            if ! ./scripts/healthcheck.sh; then
              echo "Healthcheck failed — recent logs:" >&2
              docker compose -f docker-compose.yml logs --tail=120 openclaw-gateway >&2 || true
              exit 1
            fi
            echo "Deploy OK"
