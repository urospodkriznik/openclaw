# Optional overlay: bind-mount host `gog` into gateway + CLI so `skills check` and
# the agent see the same binary. Loaded only when scripts/docker-compose.sh detects
# OPENCLAW_GOG_HOST_PATH (default /usr/local/bin/gog) on the host.
# Also mounts host gogcli config (~/.config/gogcli on Linux) so tokens/keyring match.
# See docs/GOOGLE_INTEGRATIONS.md (gog / Google Workspace CLI).

services:
  openclaw-gateway:
    volumes:
      - ${OPENCLAW_GOG_HOST_PATH:-/usr/local/bin/gog}:/usr/local/bin/gog:ro
      - ${OPENCLAW_GOGCLI_CONFIG_DIR:-./.openclaw-gog-config}:/home/node/.config/gogcli
  openclaw-cli:
    volumes:
      - ${OPENCLAW_GOG_HOST_PATH:-/usr/local/bin/gog}:/usr/local/bin/gog:ro
      - ${OPENCLAW_GOGCLI_CONFIG_DIR:-./.openclaw-gog-config}:/home/node/.config/gogcli
